<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>TL;DW options</title>
  <style>
    body { font-family: system-ui, -apple-system, sans-serif; max-width: 480px;
      margin: 32px auto; padding: 0 16px; line-height: 1.5; }
    label { display: block; font-weight: 600; margin: 16px 0 4px; }
    input { width: 100%; box-sizing: border-box; padding: 8px 10px; font: inherit;
      border: 1px solid #bbb; border-radius: 8px; }
    button { margin-top: 18px; padding: 8px 16px; font: inherit; cursor: pointer;
      background: #c00; color: #fff; border: 0; border-radius: 8px; }
    .hint { font-size: 13px; color: #666; }
    #status { margin-left: 10px; color: #0a0; font-size: 14px; }
  </style>
</head>
<body>
  <h2>TL;DW settings</h2>
  <p class="hint">Run <code>tldw serve</code> in a terminal; it prints a token. Paste it here.</p>
  <label for="serverUrl">Server URL</label>
  <input id="serverUrl" type="text" placeholder="http://127.0.0.1:8765" />
  <label for="token">Token</label>
  <input id="token" type="password" placeholder="paste the token from `tldw serve`" />
  <div><button id="save">Save</button><span id="status"></span></div>
  <script src="options.js"></script>
</body>
</html>
